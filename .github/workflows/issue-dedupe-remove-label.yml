---
name: Issue Dedupe Remove Label
on:
  workflow_call: {}

jobs:
  remove-label:
    if: >-
      ${{
        github.event.issue.state == 'open' &&
        contains(github.event.issue.labels.*.name, 'duplicate') &&
        github.event.comment.user.type != 'Bot'
      }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    timeout-minutes: 5
    steps:
      - name: Remove duplicate label on human comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.issue.number;
            console.log(`Removing duplicate label from issue #${issueNumber}`);
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: issueNumber, name: 'duplicate',
              });
              console.log(`Successfully removed duplicate label from issue #${issueNumber}`);
            } catch (error) {
              if (error.status === 404) {
                console.log(`duplicate label was already removed from issue #${issueNumber}`);
              } else {
                throw error;
              }
            }
