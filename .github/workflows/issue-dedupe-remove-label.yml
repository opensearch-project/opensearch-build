---
name: Issue Dedupe Remove Label
on:
  workflow_call:
    inputs:
      issue_number:
        type: string
        required: true
        description: 'Issue number to remove duplicate label from'
      issue_state:
        type: string
        required: true
        description: 'Current state of the issue'
      has_duplicate_label:
        type: boolean
        required: true
        description: 'Whether the issue has the duplicate label'
      commenter_is_bot:
        type: boolean
        required: true
        description: 'Whether the commenter is a bot'

jobs:
  remove-label:
    if: >-
      ${{
        inputs.issue_state == 'open' &&
        inputs.has_duplicate_label &&
        !inputs.commenter_is_bot
      }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    timeout-minutes: 5
    steps:
      - name: Remove duplicate label on human comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = parseInt('${{ inputs.issue_number }}', 10);
            console.log(`Removing duplicate label from issue #${issueNumber}`);
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: issueNumber, name: 'duplicate',
              });
              console.log(`Successfully removed duplicate label from issue #${issueNumber}`);
            } catch (error) {
              if (error.status === 404) {
                console.log(`duplicate label was already removed from issue #${issueNumber}`);
              } else {
                throw error;
              }
            }
