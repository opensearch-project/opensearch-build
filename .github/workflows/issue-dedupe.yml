---
name: Issue Dedupe
on:
  issues:
    types: [opened]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to check for duplicates'
        required: true
        type: string

jobs:
  detect:
    if: >-
      (github.event_name == 'issues' || github.event_name == 'workflow_dispatch') &&
      github.repository == 'opensearch-project/opensearch-build'
    uses: opensearch-project/opensearch-build/.github/workflows/issue-dedupe-detect.yml@main
    permissions:
      contents: read
      issues: write
      id-token: write
    secrets:
      BEDROCK_ACCESS_ROLE_ISSUE: ${{ secrets.BEDROCK_ACCESS_ROLE_ISSUE }}
    with:
      issue_number: ${{ inputs.issue_number || '' }}
      grace_days: ${{ vars.DUPLICATE_GRACE_DAYS || '7' }}

  auto-close:
    if: >-
      github.event_name == 'schedule' &&
      github.repository == 'opensearch-project/opensearch-build'
    uses: opensearch-project/opensearch-build/.github/workflows/issue-dedupe-autoclose.yml@main
    permissions:
      issues: write
    with:
      grace_days: ${{ vars.DUPLICATE_GRACE_DAYS || '7' }}
