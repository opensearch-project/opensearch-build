---
name: Issue Dedupe
on:
  workflow_call:
    secrets:
      BEDROCK_ACCESS_ROLE:
        required: false
    inputs:
      mode:
        type: string
        required: true
        description: 'detect | auto-close | remove-label'
      issue_number:
        type: string
        required: false
        description: 'Issue number to process'
      grace_days:
        type: string
        required: false
        default: '7'
      claude_model:
        type: string
        required: false
        default: 'us.anthropic.claude-sonnet-4-5-20250929-v1:0'
      dedupe_prompt:
        type: string
        required: false
        description: 'Custom prompt for dedupe detection (passed to claude-code-action)'
      allowed_bots:
        type: string
        required: false
        default: 'github-actions[bot]'
      issue_state:
        type: string
        required: false
        default: 'open'
        description: 'State of the issue (for remove-label mode)'
      has_duplicate_label:
        type: boolean
        required: false
        default: false
        description: 'Whether the issue has the duplicate label (for remove-label mode)'
      commenter_is_bot:
        type: boolean
        required: false
        default: true
        description: 'Whether the commenter is a bot (for remove-label mode)'

jobs:
  detect:
    if: ${{ inputs.mode == 'detect' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    timeout-minutes: 10
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BEDROCK_ACCESS_ROLE }}
          aws-region: us-east-1

      - name: Run Claude Code for duplicate detection
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: ${{ inputs.allowed_bots }}
          prompt: ${{ inputs.dedupe_prompt }}
          claude_args: "--model ${{ inputs.claude_model }}"

  auto-close:
    if: ${{ inputs.mode == 'auto-close' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    timeout-minutes: 10
    steps:
      - name: Auto-close duplicate issues past grace period
        uses: actions/github-script@v7
        env:
          GRACE_DAYS: ${{ inputs.grace_days }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const graceDays = parseInt(process.env.GRACE_DAYS, 10) || 7;
            const GRACE_PERIOD_MS = graceDays * 24 * 60 * 60 * 1000;
            const now = Date.now();

            // Find all open issues with the duplicate label
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'duplicate', per_page: 100,
            });

            console.log(`Found ${issues.length} open issues with duplicate label`);
            let closedCount = 0;

            for (const issue of issues) {
              console.log(`Processing issue #${issue.number}: ${issue.title}`);
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: issue.number, per_page: 100,
              });
              const dupeComments = comments.data.filter(c => c.body.includes('<!-- duplicate-detection -->'));
              if (dupeComments.length === 0) {
                console.log(`  No duplicate detection comment found, skipping`);
                continue;
              }
              const lastDupeComment = dupeComments[dupeComments.length - 1];
              const dupeCommentAge = now - new Date(lastDupeComment.created_at).getTime();
              if (dupeCommentAge < GRACE_PERIOD_MS) {
                const daysLeft = ((GRACE_PERIOD_MS - dupeCommentAge) / (24 * 60 * 60 * 1000)).toFixed(1);
                console.log(`  Duplicate comment is too recent (${daysLeft} days remaining), skipping`);
                continue;
              }
              const humanCommentsAfter = comments.data.filter(c =>
                new Date(c.created_at) > new Date(lastDupeComment.created_at) &&
                c.user.type !== 'Bot' &&
                !c.body.includes('<!-- duplicate-detection -->') &&
                !c.body.includes('automatically closed as a duplicate')
              );
              if (humanCommentsAfter.length > 0) {
                console.log(`  Has ${humanCommentsAfter.length} human comment(s) after detection, skipping`);
                continue;
              }
              const reactions = await github.rest.reactions.listForIssueComment({
                owner, repo, comment_id: lastDupeComment.id, per_page: 100,
              });
              const authorThumbsDown = reactions.data.some(r =>
                r.user.id === issue.user.id && r.content === '-1'
              );
              if (authorThumbsDown) {
                console.log(`  Issue author gave thumbs-down on duplicate comment, skipping`);
                continue;
              }
              const dupeMatch = lastDupeComment.body.match(/#(\d+)/);
              const dupeNumber = dupeMatch ? dupeMatch[1] : 'unknown';
              console.log(`  Closing as duplicate of #${dupeNumber}`);
              await github.rest.issues.update({
                owner, repo, issue_number: issue.number,
                state: 'closed', state_reason: 'duplicate',
              });
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issue.number, labels: ['autoclose'],
              });
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number,
                body: `This issue has been automatically closed as a duplicate of #${dupeNumber}.\n\nIf this is incorrect, please reopen this issue or create a new one.\n\n🤖 Generated with [Claude Code](https://claude.ai/code)`,
              });
              closedCount++;
            }
            console.log(`Done. Closed ${closedCount} duplicate issue(s).`);

  remove-label:
    if: >-
      ${{
        inputs.mode == 'remove-label' &&
        inputs.issue_state == 'open' &&
        inputs.has_duplicate_label &&
        !inputs.commenter_is_bot
      }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    timeout-minutes: 5
    steps:
      - name: Remove duplicate label on human comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = parseInt('${{ inputs.issue_number }}', 10);
            console.log(`Removing duplicate label from issue #${issueNumber}`);
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: issueNumber, name: 'duplicate',
              });
              console.log(`Successfully removed duplicate label from issue #${issueNumber}`);
            } catch (error) {
              if (error.status === 404) {
                console.log(`duplicate label was already removed from issue #${issueNumber}`);
              } else {
                throw error;
              }
            }
