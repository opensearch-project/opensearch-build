---
name: Issue Dedupe Detect
on:
  workflow_call:
    secrets:
      BEDROCK_ACCESS_ROLE_ISSUE_DEDUPE:
        required: true
    inputs:
      grace_days:
        type: string
        required: false
        default: '7'
        description: 'Days before auto-closure (shown in the comment)'
      claude_model:
        type: string
        required: false
        default: 'us.anthropic.claude-sonnet-4-6'
      issue_number:
        type: string
        required: false
        default: ''
        description: 'Issue number to check (defaults to github.event.issue.number)'

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    timeout-minutes: 10
    env:
      ISSUE_NUMBER: ${{ inputs.issue_number || github.event.issue.number }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.BEDROCK_ACCESS_ROLE_ISSUE_DEDUPE }}
          aws-region: us-east-1

      - name: Run Claude Code for duplicate detection
        uses: anthropics/claude-code-action@2ff1acb3ee319fa302837dad6e17c2f36c0d98ea # v1
        env:
          DUPLICATE_GRACE_DAYS: ${{ inputs.grace_days }}
        with:
          use_bedrock: 'true'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: '*'
          claude_args: >-
            --model ${{ inputs.claude_model }}
            --allowedTools
            "Bash(gh issue view *)"
            "Bash(gh search issues *)"
          prompt: |
            Find up to 3 likely duplicate issues for issue #${{ env.ISSUE_NUMBER }} in ${{ github.repository }}.

            Follow these steps precisely:

            1. Use `gh issue view ${{ env.ISSUE_NUMBER }} --repo ${{ github.repository }} --comments` to read the issue and its comments. If the issue is closed, or is broad product feedback without a specific bug/feature request, or already has a duplicate detection comment (containing `<!-- duplicate-detection -->`), stop immediately. Write an empty file at /tmp/dedupe-result.txt and stop.

            2. Summarize the issue's core problem in 2-3 sentences. Identify the key terms, error messages, and affected components.

            3. Search for potential duplicates using **at least 3 different search strategies**. Run these searches in parallel. **Only consider issues with a lower issue number** (older issues) as potential originals — skip any result with a number >= the current issue. Also skip issues already labeled `duplicate`.
               - `gh search issues "<exact error message or key phrase>" --repo ${{ github.repository }} --state open -- -label:duplicate --limit 15 --json number,title | jq '[.[] | select(.number < ${{ env.ISSUE_NUMBER }})]'`
               - `gh search issues "<component or feature keywords>" --repo ${{ github.repository }} --state open -- -label:duplicate --limit 15 --json number,title | jq '[.[] | select(.number < ${{ env.ISSUE_NUMBER }})]'`
               - `gh search issues "<alternate description of the problem>" --repo ${{ github.repository }} --state open -- -label:duplicate --limit 15 --json number,title | jq '[.[] | select(.number < ${{ env.ISSUE_NUMBER }})]'`
               - `gh search issues "<key terms>" --repo ${{ github.repository }} --state all -- -label:duplicate --limit 10 --json number,title | jq '[.[] | select(.number < ${{ env.ISSUE_NUMBER }})]'` (include closed issues for reference)

            4. For each candidate issue that looks like a potential match, read it with `gh issue view <number> --repo ${{ github.repository }}` to verify it is truly about the same problem. Filter out false positives — issues that merely share keywords but describe different problems.

            5. Write the confirmed 1-3 duplicates to /tmp/dedupe-result.txt in markdown list format, one per line like `- #123`. If no duplicates found, write an empty file.

            Important notes:
            - Only flag issues as duplicates when you are confident they describe the **same underlying problem**
            - Prefer open issues as duplicates, but closed issues can be referenced too
            - Do not flag the issue as a duplicate of itself
            - You MUST write /tmp/dedupe-result.txt before finishing — this is consumed by the next workflow step

      - name: Build duplicate list
        id: build-list
        shell: bash
        run: |
          RESULT_FILE="/tmp/dedupe-result.txt"
          if [ ! -f "$RESULT_FILE" ] || [ ! -s "$RESULT_FILE" ]; then
            echo "No duplicates found or result file missing"
            echo "has_duplicates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Raw dedupe result file contents:"
          cat "$RESULT_FILE"

          # Sanitize: only keep lines matching "- #<number>" pattern
          SANITIZED=$(grep -E '^- #[0-9]+$' "$RESULT_FILE" || true)
          if [ -z "$SANITIZED" ]; then
            echo "No valid duplicate entries after sanitization"
            echo "has_duplicates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_duplicates=true" >> "$GITHUB_OUTPUT"
          echo "Sanitized duplicate list:"
          echo "$SANITIZED"

          {
            echo "duplicate_list<<EOF"
            echo "$SANITIZED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Add duplicate label
        if: steps.build-list.outputs.has_duplicates == 'true'
        run: |
          gh label create "duplicate" --description "Issue is a duplicate of an existing issue" --color "cccccc" --repo "${{ github.repository }}" 2>/dev/null || true
          gh issue edit "${{ env.ISSUE_NUMBER }}" --repo "${{ github.repository }}" --add-label "duplicate"
          echo "Added duplicate label to issue #${{ env.ISSUE_NUMBER }}"

      - name: Post duplicate detection comment
        if: steps.build-list.outputs.has_duplicates == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body: |
            <!-- duplicate-detection -->
            ### Possible Duplicate

            Possible duplicate issue(s):

            ${{ steps.build-list.outputs.duplicate_list }}
            If this is **not** a duplicate:
            - Add a comment on this issue, or
            - 👎 this comment to prevent auto-closure

            Otherwise, this issue will be **automatically closed in ${{ inputs.grace_days }} days**.

            🤖 Generated with [Claude Code](https://claude.ai/code)
