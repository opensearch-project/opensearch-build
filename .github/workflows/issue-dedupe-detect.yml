---
name: Issue Dedupe Detect
on:
  workflow_call:
    secrets:
      BEDROCK_ACCESS_ROLE_ISSUE_DEDUPE:
        required: true
    inputs:
      grace_days:
        type: string
        required: false
        default: '7'
        description: 'Days before auto-closure (shown in the comment)'
      claude_model:
        type: string
        required: false
        default: 'us.anthropic.claude-sonnet-4-6'
      issue_number:
        type: string
        required: false
        default: ''
        description: 'Issue number to check (defaults to github.event.issue.number)'
      allowed_bots:
        type: string
        required: false
        default: 'github-actions[bot],dependabot[bot],mend-for-github-com[bot],opensearch-trigger-bot[bot]'

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    timeout-minutes: 10
    env:
      ISSUE_NUMBER: ${{ inputs.issue_number || github.event.issue.number }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.BEDROCK_ACCESS_ROLE_ISSUE_DEDUPE }}
          aws-region: us-east-1

      - name: Run Claude Code for duplicate detection
        uses: anthropics/claude-code-action@2ff1acb3ee319fa302837dad6e17c2f36c0d98ea # v1
        env:
          DUPLICATE_GRACE_DAYS: ${{ inputs.grace_days }}
        with:
          use_bedrock: 'true'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: ${{ inputs.allowed_bots }}
          allowed_non_write_users: '*'
          claude_args: >-
            --model ${{ inputs.claude_model }}
            --allowedTools
            "Bash(gh issue view *)"
            "Bash(gh issue comment *)"
            "Bash(gh issue edit *)"
            "Bash(gh search issues *)"
            "Bash(gh label create *)"
          prompt: |
            Find up to 3 likely duplicate issues for issue #${{ env.ISSUE_NUMBER }} in ${{ github.repository }}.

            Follow these steps precisely:

            1. Use `gh issue view ${{ env.ISSUE_NUMBER }} --repo ${{ github.repository }}` to read the issue. If the issue is closed, or is broad product feedback without a specific bug/feature request, or already has a duplicate detection comment (containing `<!-- duplicate-detection -->`), stop and report why you are not proceeding.

            2. Summarize the issue's core problem in 2-3 sentences. Identify the key terms, error messages, and affected components.

            3. Search for potential duplicates using **at least 3 different search strategies**. Run these searches in parallel. **Only consider issues with a lower issue number** (older issues) as potential originals — skip any result with a number >= the current issue. Also skip issues already labeled `duplicate-issue`.
               - `gh search issues "<exact error message or key phrase>" --repo ${{ github.repository }} --state open -- -label:duplicate-issue --limit 15 --json number,title | jq '[.[] | select(.number < ${{ env.ISSUE_NUMBER }})]'`
               - `gh search issues "<component or feature keywords>" --repo ${{ github.repository }} --state open -- -label:duplicate-issue --limit 15 --json number,title | jq '[.[] | select(.number < ${{ env.ISSUE_NUMBER }})]'`
               - `gh search issues "<alternate description of the problem>" --repo ${{ github.repository }} --state open -- -label:duplicate-issue --limit 15 --json number,title | jq '[.[] | select(.number < ${{ env.ISSUE_NUMBER }})]'`
               - `gh search issues "<key terms>" --repo ${{ github.repository }} --state all -- -label:duplicate-issue --limit 10 --json number,title | jq '[.[] | select(.number < ${{ env.ISSUE_NUMBER }})]'` (include closed issues for reference)

            4. For each candidate issue that looks like a potential match, read it with `gh issue view <number> --repo ${{ github.repository }}` to verify it is truly about the same problem. Filter out false positives — issues that merely share keywords but describe different problems.

            5. If you find 1-3 genuine duplicates, post a comment and add the duplicate-issue label by running these commands:
               a. For each duplicate, get its title:
                  `gh issue view <dup_number> --repo ${{ github.repository }} --json title -q .title`
               b. Post the comment (replace <dup_list> with formatted lines like `- #123 — Title`):
                  ```
                  gh issue comment ${{ env.ISSUE_NUMBER }} --repo ${{ github.repository }} --body "<!-- duplicate-detection -->
                  ### Possible Duplicate

                  Found **N** possible duplicate issue(s):

                  <dup_list>

                  If this is **not** a duplicate:
                  - Add a comment on this issue, or
                  - 👎 this comment to prevent auto-closure

                  Otherwise, this issue will be **automatically closed in ${DUPLICATE_GRACE_DAYS:-7} days**.

                  🤖 Generated with [Claude Code](https://claude.ai/code)"
                  ```
               c. Ensure the duplicate-issue label exists:
                  `gh label create "duplicate-issue" --description "Issue is a duplicate of an existing issue" --color "cccccc" --repo ${{ github.repository }} 2>/dev/null || true`
               d. Add the label:
                  `gh issue edit ${{ env.ISSUE_NUMBER }} --repo ${{ github.repository }} --add-label "duplicate-issue"`

            6. If no genuine duplicates are found, report that no duplicates were detected and take no further action.

            Important notes:
            - Only flag issues as duplicates when you are confident they describe the **same underlying problem**
            - Prefer open issues as duplicates, but closed issues can be referenced too
            - Do not flag the issue as a duplicate of itself
