---
name: groovy-tests

on: [push, pull_request]

jobs:
  groovy-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
      - uses: actions/checkout@v6
      - name: Run Tests
        run: |
          ./gradlew test --info
